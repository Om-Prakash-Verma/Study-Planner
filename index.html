<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Study Planner Generator</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="container">
    <section class="card input-card">
      <h1>AI Study Planner Generator</h1>
      <p class="subtitle">Build a personalized study plan in seconds.</p>

      <form id="planner-form">
        <label for="subjects">Subjects (comma-separated)</label>
        <textarea
          id="subjects"
          name="subjects"
          rows="4"
          placeholder="Math, Biology, History"
          required
        ></textarea>

        <div class="row">
          <div class="field">
            <label for="exam-date">Exam Date</label>
            <input id="exam-date" name="examDate" type="date" required />
          </div>

          <div class="field">
            <label for="hours">Hours Available / Day</label>
            <input
              id="hours"
              name="hours"
              type="number"
              min="1"
              max="16"
              step="0.5"
              placeholder="3"
              required
            />
          </div>
        </div>

        <button type="submit">Generate Plan</button>
      </form>
    </section>

    <section class="card output-card">
      <h2>Your Plan</h2>

      <div class="panel">
        <h3>Daily Study Plan</h3>
        <ul id="daily-plan" class="list"></ul>
      </div>

      <div class="panel">
        <h3>Reminders</h3>
        <ul id="reminders" class="list"></ul>
      </div>

      <div class="panel">
        <h3>Revision Schedule</h3>
        <ul id="revision-schedule" class="list"></ul>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
